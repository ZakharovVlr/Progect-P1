<!DOCTYPE html>
<html lang="ru" class="theme-auto">

<head>
    <!-- 1. Технические метатеги -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 2. SEO метатеги для поисковых роботов -->
    <title>Impasto</title>
    <link rel="icon" href="./images/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="./images/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="./images/apple-touch-icon.png">

    <meta name="description"
        content="Бесплатный и быстрый веб-фоторедактор. Обрезайте изображения, применяйте фильтры и редактируйте фото прямо в браузере.">
    <meta name="keywords" content="фоторедактор, обработка фото, canvas, javascript, редактор изображений онлайн">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Zakharov Valery / Студент Яндекс Практикума">

    <!-- 3. Метатеги Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Impasto">
    <meta property="og:description" content="Прокачайте свои фотографии прямо в браузере с помощью Impasto.">
    <meta property="og:url" content="https://github.io">
    <meta property="og:image" content="https://github.io">
    
    <!-- Размеры картинки, чтобы мессенджеры быстрее её подгружали -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- Подключение стилей -->
    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/light-theme.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/toolbar.css">
    <link rel="stylesheet" href="styles/buttons.css">
    <link rel="stylesheet" href="styles/modal-window.css">
    <link rel="stylesheet" href="styles/footer-style.css">

</head>

<body>

    <!-- Шапка приложения -->
    <header class="app-header">
        <a href="#" class="logo-link">
            <span class="logo-text">Impasto</span>
        </a>



<button class="menu-button button" type="button" onclick="window['menu-dialog'].showModal()"
    aria-controls="menu-dialog">
    <!-- Иконка меню 24x24 -->
    <svg width="24" height="24" viewBox="0 -960 960 960" fill="currentColor">
        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
    </svg>
</button>
</div>
</header>

<!-- Модальное окно с меню -->
<dialog class="modal-dialog" id="menu-dialog">
    <div class="modal-dialog__content menu-content">
        <!-- Заголовок или иконка, если нужно -->
        <h2 class="menu-title">Меню</h2>
<!-- Новый переключатель тем -->
<!-- Двухпозиционный переключатель -->
<button type="button" class="theme-switch" aria-label="Переключить тему">
    <span class="theme-switch__track">
        <!-- Подвижная ручка -->
        <span class="theme-switch__thumb">
            <!-- Иконка солнца (светлая тема) -->
            <svg class="icon icon-sun" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm-1-6v4h2V1h-2zm0 18v4h2v-4h-2zm8.66-13.66l-2.83 2.83 1.41 1.41 2.83-2.83-1.41-1.41zM6.34 7.34L3.51 4.51 2.1 5.92l2.83 2.83 1.41-1.41zm12.02 10.58l2.83 2.83 1.41-1.41-2.83-2.83-1.41 1.41zM5.92 17.66l-2.83 2.83 1.41 1.41 2.83-2.83-1.41-1.41z" />
            </svg>
            <!-- Иконка луны (тёмная тема) -->
            <svg class="icon icon-moon" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z" />
            </svg>
        </span>
    </span>
</button>
    </div>
    <!-- Кнопка закрытия -->
    <button class="modal-dialog__close-button button" type="button" onclick="window['menu-dialog'].close()">
        <svg width="24" height="24" viewBox="0 -960 960 960" fill="currentColor">
            <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
        </svg>
    </button>
</dialog>
    </header>



    <!-- Центральная рабочая зона -->
<main class="canvas-zone">
    <div class="editor-block" id="editorBlock" style="display:none;">
        <div class="canvas-wrapper">
            <canvas id="canvas" width="800" height="700"></canvas>
        </div>
    </div>
    <div class="preview-block" id="previewBlock">
        <div class="upload-zone" id="uploadZone">
            <label for="image-loader" class="upload-label">
                <span class="upload-text">Выберите изображение</span>
                <span class="upload-text">или перетащите сюда</span>
            </label>
            <input type="file" id="image-loader" accept="image/*" class="visually-hidden">
        </div>
        <button class="add-photo-button" onclick="document.getElementById('image-loader').click()">Добавить
            фото</button>
    </div>

    <!-- Панель инструментов с иконками (верхняя) -->
    <div class="toolbar toolbar--icons" role="toolbar" aria-label="Инструменты редактирования">
        <button type="button" class="tool-btn" aria-label="Текст">
            <!-- SVG иконка вставится позже -->
            <svg width="24" height="24" aria-hidden="true">
                <use href="./svg/text-format.svg" />
            </svg>
            <span class="text-button">Текст</span>
        </button>
        <button type="button" class="tool-btn" aria-label="Фильтры">
            <svg width="24" height="24" aria-hidden="true">
                <use href="./svg/filter.svg" />
            </svg>
            <span class="text-button">Фильтры</span>
        </button>
        <button type="button" class="tool-btn" aria-label="Кадрировать">
            <svg width="24" height="24" aria-hidden="true">
                <use href="./svg/crop.svg" />
            </svg>
            <span class="text-button">Кадрировать</span>
        </button>
        <button type="button" class="tool-btn" aria-label="Кисть">
            <svg width="24" height="24" aria-hidden="true">
                <use href="./svg/brush.svg" />
            </svg>
            <span class="text-button">Кисть</span>
        </button>
        <button type="button" class="tool-btn" aria-label="Размытие">
            <svg width="24" height="24" aria-hidden="true">
                <use href="./svg/blur.svg" />
            </svg>
            <span class="text-button">Размытие</span>
        </button>
    </div>
    
    <!-- Панель текстовых действий (нижняя) -->
    <div class="toolbar toolbar--text" role="group" aria-label="Дополнительные действия">
        <button type="button" class="text-btn">Стили</button>
        <button type="button" class="text-btn">Инструменты</button>
        <button type="button" class="text-btn">Экспорт</button>
    </div>
    </div>
</main>



    <!-- Подвал сайта -->
<footer class="site-footer">
    <div class="footer-bottom">
        <!-- Верхний блок: только текстовый копирайт -->
        <div class="footer-copyright">
            <span class="footer-logo">by <span class="logo-main-footer">Project-P1</span></span>
            <span class="footer-author">&copy; 2026 Impasto</span>
            <span class="footer-note">Разработано в учебных целях</span>
        </div>

        <!-- Нижний блок: кнопка выбора языка с линией наверх -->
        <div class="footer-lang-row">
            <details class="lang-selector">
                <summary class="lang-current">
                    <svg class="icon-globe" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path
                            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                        </path>
                    </svg>
                    <span>Русский</span>
                    <svg class="icon-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </summary>

                <ul class="lang-dropdown">
                    <li><a href="#" class="lang-link active">Русский</a></li>
                    <li><a href="#" class="lang-link">English (US)</a></li>
                    <li><a href="#" class="lang-link">Deutsch (Germany)</a></li>
                    <li><a href="#" class="lang-link">Français (France)</a></li>
                    <li><a href="#" class="lang-link">日本語 (Japan)</a></li>
                    <li><a href="#" class="lang-link">中文 (China)</a></li>
                </ul>
            </details>
        </div>
    </div>
</footer>




    <!-- Затем ваш скрипт -->
    <script src="js/theme.js" defer></script>
    <script src="js/main.js" defer></script>
    <!-- Правильно: Сначала библиотека -->



</body>

</html>
