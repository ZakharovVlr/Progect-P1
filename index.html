<!DOCTYPE html>
<html lang="ru" class="theme-auto">

<head>
    <!-- 1. Технические метатеги -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 2. SEO метатеги для поисковых роботов -->
    <title>Progect - P1</title>
    <meta name="description"
        content="Бесплатный и быстрый веб-фоторедактор. Обрезайте изображения, применяйте фильтры и редактируйте фото прямо в браузере.">
    <meta name="keywords" content="фоторедактор, обработка фото, canvas, javascript, редактор изображений онлайн">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Zakharov Valery / Студент Яндекс Практикума">

    <!-- 3. Метатеги Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Progect - P1 — Удобный фоторедактор">
    <meta property="og:description" content="Прокачайте свои фотографии прямо в браузере с помощью Project - P1.">
    <meta property="og:url" content="https://github.io">

    <!-- Подключение стилей -->
    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/light-theme.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/buttons.css">
</head>

<body>

    <!-- Шапка приложения -->
    <header class="app-header">
        <a href="/" class="logo-link">
            <span class="logo-text">Progect - P1</span>
        </a>

        <div class="header__theme-menu">
            <!-- Кнопка автоматической темы (системная) -->
            <button type="button"
                class="header__theme-menu-button header__theme-menu-button_active header__theme-menu-button_type_auto">
                Auto
            </button>

            <!-- Кнопка светлой темы -->
            <button type="button" class="header__theme-menu-button header__theme-menu-button_type_light">
                Day
            </button>

            <!-- Кнопка ночной темы -->
            <button type="button"
                class="header__theme-menu-button header__theme-menu-button_type_dark header__theme-menu-button_active">
                Night
            </button>

        </div>

    </header>

    <!-- Главный контейнер приложения (Сетка Grid) -->
<div class="app-container">

    <!-- Кнопка-гамбургер (только для мобильных) -->
    <button class="menu-toggle" type="button" onclick="document.getElementById('menu-dialog').showModal()"
        aria-label="Открыть меню">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
    </button>

    <!-- Левая боковая панель (для десктопа) -->
    <aside class="sidebar sidebar-left">
        <ul class="sidebar__list">
            <li><button class="sidebar__button" aria-label="Действие 1">.</button></li>
            <li><button class="sidebar__button" aria-label="Действие 2">.</button></li>
            <li><button class="sidebar__button" aria-label="Действие 3">.</button></li>
            <li><button class="sidebar__button" aria-label="Действие 4">.</button></li>
            <li><button class="sidebar__button" aria-label="Действие 5">.</button></li>
            <li><button class="sidebar__button" aria-label="Действие 6">.</button></li>
            <li><button class="sidebar__button" aria-label="Действие 7">.</button></li>
            <li><button class="sidebar__button" aria-label="Действие 8">.</button></li>
        </ul>
    </aside>

    <!-- Модальное окно (только для мобильных) -->
    <dialog class="modal-dialog" id="menu-dialog">
        <div class="modal-dialog__content">
            <ul class="sidebar__list mobile-menu-list">
                <li><button class="sidebar__button" aria-label="Действие 1">.</button></li>
                <li><button class="sidebar__button" aria-label="Действие 2">.</button></li>
                <li><button class="sidebar__button" aria-label="Действие 3">.</button></li>
                <li><button class="sidebar__button" aria-label="Действие 4">.</button></li>
                <li><button class="sidebar__button" aria-label="Действие 5">.</button></li>
                <li><button class="sidebar__button" aria-label="Действие 6">.</button></li>
                <li><button class="sidebar__button" aria-label="Действие 7">.</button></li>
                <li><button class="sidebar__button" aria-label="Действие 8">.</button></li>
            </ul>
        </div>
        <button class="modal-dialog__close-button button" type="button"
            onclick="document.getElementById('menu-dialog').close()">
            <span class="button__text">Закрыть</span>
        </button>
    </dialog>

        <!-- Центральная рабочая зона -->
        <div class="workspace-row">
            <main class="canvas-zone">
                <div class="canvas-wrapper" id="dropZone">
                    <canvas id="canvas" class="canvas" width="800" height="700"></canvas>
                    <div class="upload-zone">
                        <label for="image-loader" class="upload-label">
                            <span class="upload-text">Выбрать изображение</span>
                            <span class="upload-hint">или перетащите сюда</span>
                        </label>
                        <input type="file" id="image-loader" accept="image/*" class="visually-hidden">
                    </div>
                </div>
            </main>
        </div>

        <!-- Правая панель с кнопками -->

        <aside class="sidebar sidebar-right">
            <!-- Кнопки будут здесь -->
        </aside>

        <!-- Нижний ряд: Панель фильтров -->
        <section class="filters-panel">
            <!-- Здесь фильтры -->
        </section>

    </div>

    <!-- Подвал сайта -->
    <footer class="footer">
        <p>&copy; 2026 Progect - P1. Разработано в учебных целях.</p>
    </footer>


    <!-- Затем ваш скрипт -->
    <script src="js/theme.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/move-shadow.js" defer></script>
    <!-- Правильно: Сначала библиотека -->



</body>

</html>
