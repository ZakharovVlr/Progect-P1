<!DOCTYPE html>
<html lang="ru" class="theme-auto">

<head>
    <!-- 1. Технические метатеги -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 2. SEO метатеги для поисковых роботов -->
    <title>Impasto</title>
    <link rel="icon" href="./images/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="./images/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="./images/apple-touch-icon.png">

    <meta name="description"
        content="Бесплатный и быстрый веб-фоторедактор. Обрезайте изображения, применяйте фильтры и редактируйте фото прямо в браузере.">
    <meta name="keywords" content="фоторедактор, обработка фото, canvas, javascript, редактор изображений онлайн">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Zakharov Valery / Студент Яндекс Практикума">

    <!-- 3. Метатеги Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Impasto">
    <meta property="og:description" content="Прокачайте свои фотографии прямо в браузере с помощью Impasto.">
    <meta property="og:url" content="https://github.io">
    <meta property="og:image" content="https://github.io">

    <!-- Размеры картинки, чтобы мессенджеры быстрее её подгружали -->
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Подключение стилей -->
    <link rel="stylesheet" href="fonts/fonts.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/light-theme.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/undo-redo.css">
    <link rel="stylesheet" href="styles/toolbar.css">
    <link rel="stylesheet" href="styles/filters.css">
    <link rel="stylesheet" href="styles/buttons.css">
    <link rel="stylesheet" href="styles/modal-window.css">
    <link rel="stylesheet" href="styles/footer-style.css">


</head>

<body>

    <!-- Шапка приложения -->
    <header class="app-header">
        <a href="#" class="logo-link">
            <span class="logo-text">Impasto</span>
        </a>



        <button class="menu-button button" type="button" onclick="window['menu-dialog'].showModal()"
            aria-controls="menu-dialog">
            <!-- Иконка меню 24x24 -->
            <svg width="24" height="24" viewBox="0 -960 960 960" fill="currentColor">
                <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
            </svg>
        </button>
    </header>

    <!-- Модальное окно с меню -->
<dialog class="modal-dialog" id="menu-dialog">
    <div class="modal-dialog__header">
        <h2 class="menu-title">Меню</h2>
        <button class="modal-dialog__close-button button" type="button" onclick="window['menu-dialog'].close()">
            <svg width="24" height="24" viewBox="0 -960 960 960" fill="currentColor">
                <path
                    d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
            </svg>
        </button>
    </div>
            <!-- Новый переключатель тем -->
            <button type="button" class="theme-switch-icon-theme" aria-label="Переключить тему">
                <!-- Кнопка солнце -->
                <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                    width="24px" fill="currentColor">
                    <path
                        d="M440-760v-160h80v160h-80Zm266 110-55-55 112-115 56 57-113 113Zm54 210v-80h160v80H760ZM440-40v-160h80v160h-80ZM254-652 140-763l57-56 113 113-56 54Zm508 512L651-255l54-54 114 110-57 59ZM40-440v-80h160v80H40Zm157 300-56-57 112-112 29 27 29 28-114 114Zm113-170q-70-70-70-170t70-170q70-70 170-70t170 70q70 70 70 170t-70 170q-70 70-170 70t-170-70Zm283-57q47-47 47-113t-47-113q-47-47-113-47t-113 47q-47 47-47 113t47 113q47 47 113 47t113-47ZM480-480Z" />
                </svg>
                <!-- Кнопка луна -->
                <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                    width="24px" fill="currentColor">
                    <path
                        d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z" />
                </svg>
            </button>
    </dialog>



    <!-- Центральная рабочая зона -->
    <main class="canvas-zone">
        <div class="editor-block" id="editorBlock" style="display:none;">
            <div class="history-controls is-hidden" id="historyControls">
                <button type="button" class="history-btn" id="undoBtn" aria-label="Отменить" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" height="32px" width="32px" viewBox="0 -960 960 960"
                        fill="currentColor">
                        <path
                            d="M280-200v-80h284q63 0 109.5-40T720-420q0-60-46.5-100T564-560H312l104 104-56 56-200-200 200-200 56 56-104 104h252q97 0 166.5 63T800-420q0 94-69.5 157T564-200H280Z" />
                    </svg>
                </button>
                <button type="button" class="history-btn" id="redoBtn" aria-label="Повторить" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" height="32px" width="32px" viewBox="0 -960 960 960"
                        fill="currentColor">
                        <path
                            d="M396-200q-97 0-166.5-63T160-420q0-94 69.5-157T396-640h252L544-744l56-56 200 200-200 200-56-56 104-104H396q-63 0-109.5 40T240-420q0 60 46.5 100T396-280h284v80H396Z" />
                    </svg>
                </button>
            </div>
            <div class="canvas-wrapper">
                <canvas id="canvas" width="800" height="700"></canvas>
            </div>
        </div>

        <div class="preview-block" id="previewBlock">
            <div class="upload-zone" id="uploadZone">
                <label for="image-loader" class="upload-label">
                    <span class="upload-text">Выберите изображение</span>
                    <span class="upload-text">или перетащите сюда</span>
                </label>
                <input type="file" id="image-loader" accept="image/*" class="visually-hidden">
            </div>
            <button class="add-photo-button" onclick="document.getElementById('image-loader').click()">Добавить
                фото</button>
        </div>

        <!-- Панель инструментов с иконками (верхняя) -->
        <div class="toolbars-wrapper is-hidden" id="toolbarsWrapper">
            <div class="toolbar toolbar--icons" role="toolbar" aria-label="Инструменты редактирования">
                <button type="button" class="tool-btn" aria-label="Текст">
                    <svg height="32px" width="32px" aria-hidden="true">
                        <use href="./svg/text-format.svg" />
                    </svg>
                    <span class="text-button">Текст</span>
                </button>
                <button type="button" class="tool-btn" id="filtersBtn" aria-label="Фильтры" aria-controls="filtersMenu"
                    aria-expanded="false">
                    <svg height="32px" width="32px" aria-hidden="true">
                        <use href="./svg/filter.svg" />
                    </svg>
                    <span class="text-button">Фильтры</span>
                </button>
                <button type="button" class="tool-btn" aria-label="Кадрировать">
                    <svg height="32px" width="32px" aria-hidden="true">
                        <use href="./svg/crop.svg" />
                    </svg>
                    <span class="text-button">Кадрировать</span>
                </button>
                <button type="button" class="tool-btn" aria-label="Кисть">
                    <svg height="32px" width="32px" aria-hidden="true">
                        <use href="./svg/brush.svg" />
                    </svg>
                    <span class="text-button">Кисть</span>
                </button>
                <button type="button" class="tool-btn" aria-label="Размытие">
                    <svg height="32px" width="32px" aria-hidden="true">
                        <use href="./svg/blur.svg" />
                    </svg>
                    <span class="text-button">Размытие</span>
                </button>
            </div>

            <div class="toolbar toolbar--text" role="group" aria-label="Дополнительные действия">
                <button type="button" class="text-btn">Стили</button>
                <button type="button" class="text-btn">Инструменты</button>
                <button type="button" class="text-btn">Экспорт</button>
            </div>
        </div>

        <div class="filters-menu is-hidden" id="filtersMenu" role="region" aria-label="Меню фильтров">
            <div class="filters-menu__header">
                <button type="button" class="filters-menu__close" id="filtersMenuClose"
                    aria-label="Закрыть меню фильтров">
                    <svg height="32px" width="32px" viewBox="0 -960 960 960" fill="currentColor">
                        <path
                            d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
                    </svg>
                </button>
            </div>
            <div class="filters-menu__list">
                <button type="button" class="filter-btn" data-filter="none">
                    <span class="filter-btn__thumb" style="background-image:none;"></span>
                    <span class="filter-btn__label">Оригинал</span>
                </button>
                <button type="button" class="filter-btn" data-filter="grayscale">
                    <span class="filter-btn__thumb"></span>
                    <span class="filter-btn__label">Ч/Б</span>
                </button>
                <button type="button" class="filter-btn" data-filter="sepia">
                    <span class="filter-btn__thumb"></span>
                    <span class="filter-btn__label">Сепия</span>
                </button>
                <button type="button" class="filter-btn" data-filter="invert">
                    <span class="filter-btn__thumb"></span>
                    <span class="filter-btn__label">Инверсия</span>
                </button>
                <button type="button" class="filter-btn" data-filter="posterize">
                    <span class="filter-btn__thumb"></span>
                    <span class="filter-btn__label">Постеризация</span>
                </button>
                <button type="button" class="filter-btn" data-filter="duotone">
                    <span class="filter-btn__thumb"></span>
                    <span class="filter-btn__label">Дуотон</span>
                </button>
            </div>
        </div>

    </main>



    <!-- Подвал сайта -->
    <footer class="site-footer">
        <div class="footer-bottom">
            <!-- Верхний блок: только текстовый копирайт -->
            <div class="footer-copyright">
                <span class="footer-logo">by <span class="logo-main-footer">Project-P1</span></span>
                <span class="footer-author">&copy; 2026 Impasto</span>
                <span class="footer-note">Разработано в учебных целях</span>
            </div>

            <!-- Нижний блок: кнопка выбора языка с линией наверх -->
            <div class="footer-lang-row">
                <details class="lang-selector">
                    <summary class="lang-current">
                        <svg class="icon-globe" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path
                                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                            </path>
                        </svg>
                        <span>Русский</span>
                        <svg class="icon-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </summary>

                    <ul class="lang-dropdown">
                        <li><a href="#" class="lang-link active">Русский</a></li>
                        <li><a href="#" class="lang-link">English (US)</a></li>
                        <li><a href="#" class="lang-link">Deutsch (Germany)</a></li>
                        <li><a href="#" class="lang-link">Français (France)</a></li>
                        <li><a href="#" class="lang-link">日本語 (Japan)</a></li>
                        <li><a href="#" class="lang-link">中文 (China)</a></li>
                    </ul>
                </details>
            </div>
        </div>
    </footer>




    <!-- скрипт -->
    <script src="js/filters/original-filter.js" defer></script>
    <script src="js/filters/grayscale.js" defer></script>
    <script src="js/filters/invert.js" defer></script>
    <script src="js/filters/sepia.js" defer></script>
    <script src="js/filters/posterize.js" defer></script>
    <script src="js/filters/duotone.js" defer></script>
    <script src="js/filters-index.js" defer></script>
    <script src="js/filter-previews.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/theme.js" defer></script>

</body>

</html>
