<!DOCTYPE html>
<html lang="ru">

<head>
    <!-- 1. Технические метатеги -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 2. SEO метатеги для поисковых роботов -->
    <title>Progect - P1</title>
    <meta name="description"
        content="Бесплатный и быстрый веб-фоторедактор. Обрезайте изображения, применяйте фильтры и редактируйте фото прямо в браузере.">
    <meta name="keywords" content="фоторедактор, обработка фото, canvas, javascript, редактор изображений онлайн">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Ваше Имя / Студент Яндекс Практикума">

    <!-- 3. Метатеги Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="PixelCraft — Удобный фоторедактор">
    <meta property="og:description" content="Прокачайте свои фотографии прямо в браузере с помощью PixelCraft.">
    <meta property="og:url" content="https://github.io">

    <!-- Подключение стилей -->
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <!-- Шапка приложения -->
    <header class="app-header">
        <a href="/" class="logo-link">
            <span class="logo-text">Progect - P1</span>
        </a>
    </header>

    <!-- Главный контейнер приложения (Сетка Grid) -->
    <div class="app-container">

        <!-- Левая панель с кнопками -->
        <aside class="sidebar sidebar--left">
            <!-- Кнопки будут здесь -->
        </aside>

        <!-- Центральная рабочая зона -->
        <div class="workspace-row">
            <main class="canvas-zone">
                <div class="canvas-wrapper" id="drop-zone">
                    <!-- Текст-кнопка для загрузки -->
                    <div class="upload-zone">
                        <input type="file" id="file-input" class="upload-zone__input" accept="image/*" hidden />
                        <label for="file-input" class="upload-zone__button">
                            Загрузите изображение
                        </label>
                    </div>

                    <!-- Холст для редактора -->
                    <canvas id="editor-canvas" width="800" height="700"></canvas>
                </div>
            </main>
        </div>

        <!-- Правая панель с кнопками -->
        <aside class="sidebar sidebar--right">
            <!-- Кнопки будут здесь -->
        </aside>

        <!-- Нижний ряд: Панель фильтров -->
        <section class="filters-panel">
            <!-- Здесь фильтры -->
        </section>

    </div>

    <!-- Подвал сайта -->
    <footer class="footer">
        <p>&copy; 2026 Progect - P1. Разработано в учебных целях.</p>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
